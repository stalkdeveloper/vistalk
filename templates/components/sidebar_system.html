
<div class="sys-sidebar" id="sidebar">

    <div class="sidebar-nav">
        <div class="nav-section-label">MAIN</div>
        
        <!-- Dashboard Link -->
        <a href="{% url 'core:admin_dashboard' %}"

        <!-- Users Link -->
