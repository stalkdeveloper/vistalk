<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Vistalk{% endblock %}</title>

  {% load static %}
  <link rel="stylesheet" href="{% static 'css/variables.css' %}">
  {% block css %}{% endblock %}

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="{% block body_class %}{% endblock %}">

<!-- Theme boot (runs before paint to avoid FOUC) -->
<script>
  (function(){
    var t = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
    document.body.setAttribute('data-theme', t);
  })();
</script>

{% if messages %}
<div class="toast-wrap">
  {% for msg in messages %}
  <div class="toast {{ msg.tags }}">{{ msg }}</div>
  {% endfor %}
</div>
{% endif %}

{% block content %}{% endblock %}

<script>
// ── Theme toggle ──────────────────────────────────────────────
function toggleTheme() {
  var cur = document.body.getAttribute('data-theme');
  var next = cur === 'light' ? 'dark' : 'light';
  document.body.setAttribute('data-theme', next);
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.querySelectorAll('.theme-toggle i').forEach(function(el){
    el.classList.remove('active');
    if ((next==='light' && el.classList.contains('fa-sun')) ||
        (next==='dark'  && el.classList.contains('fa-moon'))) {
      el.classList.add('active');
    }
  });
}

// ── Toast auto-dismiss ────────────────────────────────────────
setTimeout(function(){
  document.querySelectorAll('.toast').forEach(function(t){
    t.style.transition = 'opacity .4s';
    t.style.opacity = '0';
    setTimeout(function(){ t.remove(); }, 400);
  });
}, 4000);

// ── Mobile nav ────────────────────────────────────────────────
function toggleMobileMenu(){
  var m = document.getElementById('mobileMenu');
  if (m) m.classList.toggle('open');
}

// ── User dropdown ─────────────────────────────────────────────
function toggleUserDropdown(){
  var d = document.getElementById('userDropdown');
  if (d) d.classList.toggle('open');
}
document.addEventListener('click', function(e){
  var chip = document.querySelector('.topbar-user');
  var dd   = document.getElementById('userDropdown');
  if (chip && dd && !chip.contains(e.target)) dd.classList.remove('open');
});

// ── Sidebar toggle (admin) ────────────────────────────────────
function toggleSidebar(){
  var sb   = document.getElementById('sidebar');
  var main = document.getElementById('admMain');
  if (!sb) return;
  if (window.innerWidth <= 768) {
    sb.classList.toggle('mobile-open');
  } else {
    sb.classList.toggle('collapsed');
    if (main) main.classList.toggle('expanded');
  }
}

// ── Sync theme icon state on load ─────────────────────────────
document.addEventListener('DOMContentLoaded', function(){
  var theme = document.body.getAttribute('data-theme');
  document.querySelectorAll('.theme-toggle i').forEach(function(el){
    el.classList.remove('active');
    if ((theme==='light' && el.classList.contains('fa-sun')) ||
        (theme==='dark'  && el.classList.contains('fa-moon'))) {
      el.classList.add('active');
    }
  });
});
</script>

{% block js %}{% endblock %}
</body>
</html>
